<app-navbar></app-navbar>

<div class="min-h-screen bg-gray-50 py-12 px-4 sm:px-6 lg:px-8">
  <div class="max-w-3xl mx-auto space-y-6">

    <!-- Loading State -->
    <div *ngIf="loading() && !profile()" class="animate-pulse bg-white rounded-xl shadow-sm border border-gray-100 p-8 flex flex-col items-center">
      <div class="h-24 w-24 bg-gray-200 rounded-full mb-4"></div>
      <div class="h-6 w-48 bg-gray-200 rounded mb-2"></div>
      <div class="h-4 w-32 bg-gray-200 rounded"></div>
    </div>

    <!-- Error State -->
    <div *ngIf="error()" class="bg-red-50 border border-red-200 rounded-xl p-4 text-red-600 flex items-center justify-between shadow-sm">
      <div class="flex items-center gap-2">
        <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" viewBox="0 0 20 20" fill="currentColor">
          <path fill-rule="evenodd" d="M18 10a8 8 0 11-16 0 8 8 0 0116 0zm-7 4a1 1 0 11-2 0 1 1 0 012 0zm-1-9a1 1 0 00-1 1v4a1 1 0 102 0V6a1 1 0 00-1-1z" clip-rule="evenodd" />
        </svg>
        <span>{{ error() }}</span>
      </div>
      <button (click)="error.set('')" class="text-red-400 hover:text-red-500">
        <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" viewBox="0 0 20 20" fill="currentColor"><path fill-rule="evenodd" d="M4.293 4.293a1 1 0 011.414 0L10 8.586l4.293-4.293a1 1 0 111.414 1.414L11.414 10l4.293 4.293a1 1 0 01-1.414 1.414L10 11.414l-4.293 4.293a1 1 0 01-1.414-1.414L8.586 10 4.293 5.707a1 1 0 010-1.414z" clip-rule="evenodd" /></svg>
      </button>
    </div>

    <!-- Success State -->
    <div *ngIf="success()" class="bg-green-50 border border-green-200 rounded-xl p-4 text-green-600 flex items-center shadow-sm">
      <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 border-green-200 mr-2" viewBox="0 0 20 20" fill="currentColor"><path fill-rule="evenodd" d="M10 18a8 8 0 100-16 8 8 0 000 16zm3.707-9.293a1 1 0 00-1.414-1.414L9 10.586 7.707 9.293a1 1 0 00-1.414 1.414l2 2a1 1 0 001.414 0l4-4z" clip-rule="evenodd" /></svg>
      {{ success() }}
    </div>

    <div *ngIf="profile()" class="bg-white rounded-xl shadow-sm border border-gray-100 overflow-hidden">
      <!-- Header Area -->
      <div class="h-32 bg-gradient-to-r from-blue-600 to-indigo-700"></div>
      
      <div class="px-8 pb-8 relative">
        <div class="flex justify-between items-end mb-6 -mt-12">
          <!-- Avatar Section -->
          <div class="relative group">
            <div class="h-24 w-24 rounded-full border-4 border-white bg-indigo-100 flex items-center justify-center text-3xl font-bold text-indigo-700 overflow-hidden shadow-md">
              <img *ngIf="profile()?.profileImageUrl" [src]="profile()?.profileImageUrl" alt="Profile" class="h-full w-full object-cover">
              <span *ngIf="!profile()?.profileImageUrl">{{ profile()?.name?.charAt(0) | uppercase }}</span>
            </div>
            
            <!-- Upload Button overlay -->
            <label class="absolute inset-0 flex items-center justify-center bg-black/50 text-white rounded-full opacity-0 group-hover:opacity-100 cursor-pointer transition-opacity backdrop-blur-sm">
              <svg *ngIf="!uploadingImage()" xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 9a2 2 0 012-2h.93a2 2 0 001.664-.89l.812-1.22A2 2 0 0110.07 4h3.86a2 2 0 011.664.89l.812 1.22A2 2 0 0018.07 7H19a2 2 0 012 2v9a2 2 0 01-2 2H5a2 2 0 01-2-2V9z" /><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 13a3 3 0 11-6 0 3 3 0 016 0z" /></svg>
              <svg *ngIf="uploadingImage()" class="animate-spin h-6 w-6 text-white" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24"><circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle><path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path></svg>
              <input type="file" class="hidden" accept="image/*" (change)="onImageSelected($event)" [disabled]="uploadingImage()">
            </label>
          </div>
          
          <button (click)="toggleEdit()" class="px-4 py-2 bg-gray-50 text-gray-700 text-sm font-medium rounded-lg border border-gray-200 hover:bg-gray-100 transition-colors shadow-sm">
            {{ isEditing() ? 'Cancel' : 'Edit Profile' }}
          </button>
        </div>

        <!-- VIEW MODE -->
        <div *ngIf="!isEditing()" class="space-y-6">
          <div>
            <h1 class="text-2xl font-bold text-gray-900 flex items-center gap-2">
              {{ profile()?.name }}
               <span class="inline-flex items-center px-2.5 py-0.5 rounded-full text-xs font-medium bg-blue-100 text-blue-800">
                {{ profile()?.role }}
              </span>
            </h1>
            <div class="mt-2 text-gray-500 flex flex-wrap gap-4 text-sm">
              <span class="flex items-center gap-1.5">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 8l7.89 5.26a2 2 0 002.22 0L21 8M5 19h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z" /></svg>
                {{ profile()?.email }}
              </span>
              <span *ngIf="profile()?.phone" class="flex items-center gap-1.5">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 5a2 2 0 012-2h3.28a1 1 0 01.948.684l1.498 4.493a1 1 0 01-.502 1.21l-2.257 1.13a11.042 11.042 0 005.516 5.516l1.13-2.257a1 1 0 011.21-.502l4.493 1.498a1 1 0 01.684.949V19a2 2 0 01-2 2h-1C9.716 21 3 14.284 3 6V5z" /></svg>
                {{ profile()?.phone }}
              </span>
              <span *ngIf="profile()?.location" class="flex items-center gap-1.5">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17.657 16.657L13.414 20.9a1.998 1.998 0 01-2.827 0l-4.244-4.243a8 8 0 1111.314 0z" /><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 11a3 3 0 11-6 0 3 3 0 016 0z" /></svg>
                {{ profile()?.location }}
              </span>
            </div>
          </div>

          <div class="border-t border-gray-100 pt-6">
            <h3 class="text-sm font-semibold text-gray-900 uppercase tracking-wider mb-3">About</h3>
            <p class="text-gray-600 text-sm leading-relaxed" [class.text-gray-400]="!profile()?.bio">
              {{ profile()?.bio || 'No bio provided.' }}
            </p>
          </div>

          <div class="border-t border-gray-100 pt-6">
            <h3 class="text-sm font-semibold text-gray-900 uppercase tracking-wider mb-3">Skills</h3>
            <div *ngIf="profile()?.skills" class="flex flex-wrap gap-2">
              <span *ngFor="let s of profile()?.skills?.split(',')" class="badge badge-gray">
                {{ s.trim() }}
              </span>
            </div>
            <p *ngIf="!profile()?.skills" class="text-gray-400 text-sm">No skills listed.</p>
          </div>
        </div>

        <!-- EDIT MODE -->
        <form *ngIf="isEditing()" [formGroup]="editForm" (ngSubmit)="saveProfile()" class="space-y-6">
          <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
            <div>
              <label class="block text-sm font-medium text-gray-700 mb-1">Full Name *</label>
              <input type="text" formControlName="name" class="w-full px-4 py-2 rounded-lg border border-gray-300 focus:ring-2 focus:ring-blue-500 focus:border-blue-500 transition-shadow">
            </div>
            <div>
              <label class="block text-sm font-medium text-gray-700 mb-1">Phone</label>
              <input type="text" formControlName="phone" class="w-full px-4 py-2 rounded-lg border border-gray-300 focus:ring-2 focus:ring-blue-500 focus:border-blue-500 transition-shadow">
            </div>
            <div class="md:col-span-2">
              <label class="block text-sm font-medium text-gray-700 mb-1">Location</label>
              <input type="text" formControlName="location" class="w-full px-4 py-2 rounded-lg border border-gray-300 focus:ring-2 focus:ring-blue-500 focus:border-blue-500 transition-shadow">
            </div>
            <div class="md:col-span-2">
              <label class="block text-sm font-medium text-gray-700 mb-1">Skills (comma separated)</label>
              <input type="text" formControlName="skills" placeholder="Java, Angular, Spring Boot" class="w-full px-4 py-2 rounded-lg border border-gray-300 focus:ring-2 focus:ring-blue-500 focus:border-blue-500 transition-shadow">
            </div>
            <div class="md:col-span-2">
              <label class="block text-sm font-medium text-gray-700 mb-1">Bio</label>
              <textarea formControlName="bio" rows="4" class="w-full px-4 py-2 rounded-lg border border-gray-300 focus:ring-2 focus:ring-blue-500 focus:border-blue-500 transition-shadow"></textarea>
            </div>
          </div>
          <div class="flex justify-end pt-4 border-t border-gray-100">
            <button type="submit" [disabled]="editForm.invalid || loading()" class="px-6 py-2 bg-blue-600 text-white font-medium rounded-lg hover:bg-blue-700 focus:ring-4 focus:ring-blue-500/50 transition-colors disabled:opacity-50 flex items-center gap-2">
              <svg *ngIf="loading()" class="animate-spin h-5 w-5 text-white" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24"><circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle><path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path></svg>
              Save Changes
            </button>
          </div>
        </form>

      </div>
    </div>
  </div>
</div>
