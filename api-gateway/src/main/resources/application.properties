# =====================================================
# SERVER
# =====================================================
server.port=8085
spring.application.name=api-gateway
spring.main.web-application-type=reactive

# =====================================================
# EUREKA
# =====================================================
eureka.client.service-url.defaultZone=http://localhost:8761/eureka/
eureka.instance.prefer-ip-address=true

# =====================================================
# JWT
# =====================================================
jwt.secret=${JWT_SECRET}

# =====================================================
# ACTUATOR
# =====================================================
management.endpoint.health.show-details=always
management.endpoints.web.exposure.include=health,info

# =====================================================
# GATEWAY ROUTES 
# =====================================================

# AUTH SERVICE
spring.cloud.gateway.server.webflux.routes[0].id=auth-service
spring.cloud.gateway.server.webflux.routes[0].uri=lb://auth-service
spring.cloud.gateway.server.webflux.routes[0].predicates[0]=Path=/api/auth/**

# JOB SERVICE
spring.cloud.gateway.server.webflux.routes[1].id=job-service
spring.cloud.gateway.server.webflux.routes[1].uri=lb://job-service
spring.cloud.gateway.server.webflux.routes[1].predicates[0]=Path=/api/jobs/**

# APPLICATION SERVICE
spring.cloud.gateway.server.webflux.routes[2].id=application-service
spring.cloud.gateway.server.webflux.routes[2].uri=lb://application-service
spring.cloud.gateway.server.webflux.routes[2].predicates[0]=Path=/api/applications/**

# ADMIN SERVICE
spring.cloud.gateway.server.webflux.routes[3].id=admin-service
spring.cloud.gateway.server.webflux.routes[3].uri=lb://admin-service
spring.cloud.gateway.server.webflux.routes[3].predicates[0]=Path=/api/admin/**

# NOTIFICATION SERVICE
spring.cloud.gateway.server.webflux.routes[4].id=notification-service
spring.cloud.gateway.server.webflux.routes[4].uri=lb://notification-service
spring.cloud.gateway.server.webflux.routes[4].predicates[0]=Path=/api/notifications/**