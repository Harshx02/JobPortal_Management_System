server.port=8086
spring.application.name=notification-service

# Eureka
eureka.client.service-url.defaultZone=http://localhost:8761/eureka/

# RabbitMQ
spring.rabbitmq.host=localhost
spring.rabbitmq.port=5672
spring.rabbitmq.username=${RABBITMQ_USERNAME}
spring.rabbitmq.password=${RABBITMQ_PASSWORD}

# SMTP Configuration (Gmail Example)
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${EMAIL}
spring.mail.password=${PASSWORD}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

# =====================================================
# Redis Configuration
# =====================================================
spring.data.redis.host=localhost
spring.data.redis.port=6379
spring.data.redis.timeout=60000ms
spring.data.redis.jedis.pool.max-active=8
spring.data.redis.jedis.pool.max-idle=8
spring.data.redis.jedis.pool.min-idle=0

# =====================================================
# Actuator Configuration
# =====================================================
management.endpoints.web.exposure.include=health,info,metrics,prometheus
management.endpoint.health.show-details=always

# =====================================================
# Internal Configuration
# =====================================================
internal.secret=${INTERNAL_SECRET}

# =====================================================
# Queue Names
# =====================================================
rabbitmq.queue.job.posted=email.job-posted
rabbitmq.queue.job.applied=email.job-applied
rabbitmq.queue.application.status=email.application-status

# =====================================================
# Resilience4j Circuit Breaker Configuration
# =====================================================
spring.cloud.circuitbreaker.resilience4j.enabled=true
feign.circuitbreaker.enabled=true

# Auth Service Circuit Breaker
resilience4j.circuitbreaker.instances.auth-service.registerHealthIndicator=true
resilience4j.circuitbreaker.instances.auth-service.sliding-window-size=10
resilience4j.circuitbreaker.instances.auth-service.failure-rate-threshold=50
resilience4j.circuitbreaker.instances.auth-service.wait-duration-in-open-state=10000
resilience4j.circuitbreaker.instances.auth-service.permitted-number-of-calls-in-half-open-state=3
resilience4j.circuitbreaker.instances.auth-service.automatic-transition-from-open-to-half-open-enabled=true

# Auth Service Timeout
resilience4j.timelimiter.instances.auth-service.timeout-duration=5s
resilience4j.timelimiter.instances.auth-service.cancel-running-future=true

# Auth Service Retry
resilience4j.retry.instances.auth-service.max-attempts=3
resilience4j.retry.instances.auth-service.wait-duration=1000
resilience4j.retry.instances.auth-service.retry-exceptions=java.io.IOException,feign.FeignException
