# Test DataSource (H2 In-Memory)
spring.datasource.url=jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;MODE=MySQL
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop

# Mock Secrets for test isolation
jwt.secret=mock_jwt_secret_value_for_testing_only_32_characters
jwt.expiration=3600000
internal.secret=mock_internal_secret

# Disable external services for tests
spring.rabbitmq.enabled=false
spring.data.redis.repositories.enabled=false
spring.data.redis.host=localhost
eureka.client.enabled=false

# Mock/Default values for placeholders (Upper and lower case for compatibility)
DB_USERNAME=sa
DB_PASSWORD=
RABBITMQ_USERNAME=guest
RABBITMQ_PASSWORD=guest
JWT_SECRET=testSecret12345678901234567890123456789012
JWT_EXPIRATION=3600000
jwt.secret=testSecret12345678901234567890123456789012
jwt.expiration=3600000
ZIPKIN_URL=http://localhost:9411

internal.secret=testSecret12345678901234567890123456789012
cloudinary.cloud_name=test
cloudinary.api_key=test
cloudinary.api_secret=test

