server.port=8084
spring.application.name=admin-service

eureka.client.service-url.defaultZone=http://eureka-server:8761/eureka/
eureka.instance.prefer-ip-address=true

# Database Properties (Using createDatabaseIfNotExist)
spring.datasource.url=jdbc:mysql://mysql:3306/job_portal_auth_db?createDatabaseIfNotExist=true
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true


# =====================================================
# RabbitMQ Configuration
# =====================================================
spring.rabbitmq.host=rabbitmq
spring.rabbitmq.port=5672
spring.rabbitmq.username=${RABBITMQ_USERNAME}
spring.rabbitmq.password=${RABBITMQ_PASSWORD}

# =====================================================
# Actuator Configuration
# =====================================================
management.endpoints.web.exposure.include=health,info,prometheus
management.endpoint.health.show-details=always
management.endpoint.prometheus.enabled=true
management.metrics.export.prometheus.enabled=true

# =====================================================
# Distributed Tracing (Zipkin)
# =====================================================
management.tracing.sampling.probability=1.0
management.zipkin.tracing.endpoint=${ZIPKIN_URL:http://zipkin:9411/api/v2/spans}
logging.pattern.level=%5p [${spring.application.name:},%X{traceId:-},%X{spanId:-}]

# =====================================================
# RabbitMQ Observation
# =====================================================
spring.rabbitmq.template.observation.enabled=true
spring.rabbitmq.listener.observation.enabled=true

# =====================================================
# Internal Configuration
# =====================================================
internal.secret=${INTERNAL_SECRET}

# =====================================================
# Resilience4j Circuit Breaker Configuration
# =====================================================
spring.cloud.circuitbreaker.resilience4j.enabled=true
feign.circuitbreaker.enabled=true

# Auth Service Circuit Breaker
resilience4j.circuitbreaker.instances.auth-service.registerHealthIndicator=true
resilience4j.circuitbreaker.instances.auth-service.sliding-window-size=10
resilience4j.circuitbreaker.instances.auth-service.failure-rate-threshold=50
resilience4j.circuitbreaker.instances.auth-service.wait-duration-in-open-state=10000
resilience4j.circuitbreaker.instances.auth-service.permitted-number-of-calls-in-half-open-state=3
resilience4j.circuitbreaker.instances.auth-service.automatic-transition-from-open-to-half-open-enabled=true

# Auth Service Timeout
resilience4j.timelimiter.instances.auth-service.timeout-duration=5s
resilience4j.timelimiter.instances.auth-service.cancel-running-future=true

# Auth Service Retry
resilience4j.retry.instances.auth-service.max-attempts=3
resilience4j.retry.instances.auth-service.wait-duration=1000
resilience4j.retry.instances.auth-service.retry-exceptions=java.io.IOException,feign.FeignException

# Job Service Circuit Breaker
resilience4j.circuitbreaker.instances.job-service.registerHealthIndicator=true
resilience4j.circuitbreaker.instances.job-service.sliding-window-size=10
resilience4j.circuitbreaker.instances.job-service.failure-rate-threshold=50
resilience4j.circuitbreaker.instances.job-service.wait-duration-in-open-state=10000
resilience4j.circuitbreaker.instances.job-service.permitted-number-of-calls-in-half-open-state=3
resilience4j.circuitbreaker.instances.job-service.automatic-transition-from-open-to-half-open-enabled=true

# Job Service Timeout
resilience4j.timelimiter.instances.job-service.timeout-duration=5s
resilience4j.timelimiter.instances.job-service.cancel-running-future=true

# Job Service Retry
resilience4j.retry.instances.job-service.max-attempts=3
resilience4j.retry.instances.job-service.wait-duration=1000
resilience4j.retry.instances.job-service.retry-exceptions=java.io.IOException,feign.FeignException

# Application Service Circuit Breaker
resilience4j.circuitbreaker.instances.application-service.registerHealthIndicator=true
resilience4j.circuitbreaker.instances.application-service.sliding-window-size=10
resilience4j.circuitbreaker.instances.application-service.failure-rate-threshold=50
resilience4j.circuitbreaker.instances.application-service.wait-duration-in-open-state=10000
resilience4j.circuitbreaker.instances.application-service.permitted-number-of-calls-in-half-open-state=3
resilience4j.circuitbreaker.instances.application-service.automatic-transition-from-open-to-half-open-enabled=true

# Application Service Timeout
resilience4j.timelimiter.instances.application-service.timeout-duration=5s
resilience4j.timelimiter.instances.application-service.cancel-running-future=true

# Application Service Retry
resilience4j.retry.instances.application-service.max-attempts=3
resilience4j.retry.instances.application-service.wait-duration=1000
resilience4j.retry.instances.application-service.retry-exceptions=java.io.IOException,feign.FeignException