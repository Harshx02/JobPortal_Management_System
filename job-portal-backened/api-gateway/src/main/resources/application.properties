# =====================================================
# SERVER
# =====================================================
server.port=8085
spring.application.name=api-gateway
spring.main.web-application-type=reactive

# =====================================================
# EUREKA
# =====================================================
eureka.client.service-url.defaultZone=http://eureka-server:8761/eureka/
eureka.instance.prefer-ip-address=true

# =====================================================
# JWT
# =====================================================
jwt.secret=${JWT_SECRET}

# =====================================================
# ACTUATOR
# =====================================================
management.endpoint.health.show-details=always
management.endpoints.web.exposure.include=health,info,prometheus
management.endpoint.prometheus.enabled=true
management.metrics.export.prometheus.enabled=true

# =====================================================
# TRACING (ZIPKIN)
# =====================================================
management.tracing.sampling.probability=1.0
management.zipkin.tracing.endpoint=${ZIPKIN_URL:http://zipkin:9411/api/v2/spans}
logging.pattern.level=%5p [${spring.application.name:},%X{traceId:-},%X{spanId:-}]

# =====================================================
# GATEWAY ROUTES 
# =====================================================

# AUTH SERVICE (PUBLIC: LOGIN, REGISTER)
spring.cloud.gateway.routes[0].id=auth-service-public
spring.cloud.gateway.routes[0].uri=lb://auth-service
spring.cloud.gateway.routes[0].predicates[0]=Path=/api/auth/login, /api/auth/register, /api/auth/forgot-password, /api/auth/verify-otp, /api/auth/reset-password

# AUTH SERVICE (PROTECTED: USERS, PROFILE)
spring.cloud.gateway.routes[1].id=auth-service-protected
spring.cloud.gateway.routes[1].uri=lb://auth-service
spring.cloud.gateway.routes[1].predicates[0]=Path=/api/auth/users/**, /api/auth/profile, /api/auth/users
spring.cloud.gateway.routes[1].filters[0]=AuthenticationFilter

# JOB SERVICE (PUBLIC: LIST, DETAIL)
spring.cloud.gateway.routes[2].id=job-service-public
spring.cloud.gateway.routes[2].uri=lb://job-service
spring.cloud.gateway.routes[2].predicates[0]=Path=/api/jobs/**
spring.cloud.gateway.routes[2].predicates[1]=Method=GET

# JOB SERVICE (PUBLIC: SEARCH)
spring.cloud.gateway.routes[3].id=job-service-search
spring.cloud.gateway.routes[3].uri=lb://job-service
spring.cloud.gateway.routes[3].predicates[0]=Path=/api/jobs/search
spring.cloud.gateway.routes[3].predicates[1]=Method=POST

# JOB SERVICE (PROTECTED: CREATE, UPDATE, DELETE)
spring.cloud.gateway.routes[4].id=job-service-protected
spring.cloud.gateway.routes[4].uri=lb://job-service
spring.cloud.gateway.routes[4].predicates[0]=Path=/api/jobs/**
spring.cloud.gateway.routes[4].filters[0]=AuthenticationFilter

# APPLICATION SERVICE (PROTECTED)
spring.cloud.gateway.routes[5].id=application-service
spring.cloud.gateway.routes[5].uri=lb://application-service
spring.cloud.gateway.routes[5].predicates[0]=Path=/api/applications/**
spring.cloud.gateway.routes[5].filters[0]=AuthenticationFilter

# ADMIN SERVICE (PUBLIC STATS)
spring.cloud.gateway.routes[6].id=admin-service-public
spring.cloud.gateway.routes[6].uri=lb://admin-service
spring.cloud.gateway.routes[6].predicates[0]=Path=/api/admin/public/**

# ADMIN SERVICE (PROTECTED)
spring.cloud.gateway.routes[7].id=admin-service
spring.cloud.gateway.routes[7].uri=lb://admin-service
spring.cloud.gateway.routes[7].predicates[0]=Path=/api/admin/**
spring.cloud.gateway.routes[7].filters[0]=AuthenticationFilter

# NOTIFICATION SERVICE (PROTECTED)
spring.cloud.gateway.routes[8].id=notification-service
spring.cloud.gateway.routes[8].uri=lb://notification-service
spring.cloud.gateway.routes[8].predicates[0]=Path=/api/notifications/**
spring.cloud.gateway.routes[8].filters[0]=AuthenticationFilter