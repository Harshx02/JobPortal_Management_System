# Test DataSource (H2 In-Memory)
spring.datasource.url=jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;MODE=MySQL
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop

# Mock Secrets and Mail for test isolation
jwt.secret=mock_jwt_secret_value_for_testing_only_32_characters
jwt.expiration=3600000
internal.secret=mock_internal_secret
spring.mail.host=${SPRING_MAIL_HOST:localhost}
spring.mail.port=587

# Disable external services for tests
spring.rabbitmq.enabled=false
spring.data.redis.repositories.enabled=false
spring.data.redis.host=localhost
eureka.client.enabled=false

# Mock/Default values for placeholders
DB_USERNAME=sa
DB_PASSWORD=
RABBITMQ_USERNAME=guest
RABBITMQ_PASSWORD=guest
SPRING_MAIL_HOST=localhost
ZIPKIN_URL=http://localhost:9411
