# Server
server.port=8082
spring.application.name=job-service

spring.datasource.url=jdbc:mysql://mysql:3306/job_portal_auth_db?createDatabaseIfNotExist=true
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

#jpa
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.format_sql=true

# RabbitMQ
spring.rabbitmq.host=rabbitmq
spring.rabbitmq.port=5672
spring.rabbitmq.username=${RABBITMQ_USERNAME}
spring.rabbitmq.password=${RABBITMQ_PASSWORD}

# Queue Names
rabbitmq.queue.job.posted=email.job-posted
rabbitmq.queue.user.delete=user-delete-requested
rabbitmq.queue.application.deleted=application-deleted
rabbitmq.queue.jobs.deleted=jobs-deleted



# =====================================================
# Redis Configuration
# =====================================================
spring.data.redis.host=redis
spring.data.redis.port=6379
spring.data.redis.timeout=60000ms
spring.data.redis.jedis.pool.max-active=8
spring.data.redis.jedis.pool.max-idle=8
spring.data.redis.jedis.pool.min-idle=0

# =====================================================
# Actuator Configuration
# =====================================================
management.endpoints.web.exposure.include=health,info,prometheus
management.endpoint.health.show-details=always
management.endpoint.prometheus.enabled=true
management.metrics.export.prometheus.enabled=true

# =====================================================
# Distributed Tracing (Zipkin)
# =====================================================
management.tracing.sampling.probability=1.0
management.zipkin.tracing.endpoint=${ZIPKIN_URL:http://zipkin:9411/api/v2/spans}
logging.pattern.level=%5p [${spring.application.name:},%X{traceId:-},%X{spanId:-}]

# =====================================================
# RabbitMQ Observation
# =====================================================
spring.rabbitmq.template.observation.enabled=true
spring.rabbitmq.listener.observation.enabled=true

# Eureka
eureka.client.service-url.defaultZone=http://eureka-server:8761/eureka/
eureka.instance.prefer-ip-address=true